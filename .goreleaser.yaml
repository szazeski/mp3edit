
before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - 386
      - amd64
      - arm64

checksum:
  name_template: 'checksums.txt'

archives:
  - id: checkssl
    name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}

    format_overrides:
      - goos: windows
        format: zip

brews:
  - name: mp3edit

    tap:
      owner: szazeski
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

    url_template: "https://github.com/szazeski/mp3edit/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

    commit_author:
      name: goreleaserbot
      email: goreleaser@zazeski.com

    # The project name and current git tag are used in the format string.
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"

    # Folder inside the repository to put the formula.
    # Default is the root folder.
    folder: Formula

    homepage: "https://opensource.zazeski.com/"
    description: "Simple cli to view or change mp3 id3 tags."
    license: "MIT"

    test: |
      system "#{bin}/mp3edit -version"

    # In normal installation, we just download the prebuilt binary so end users don't need a full working go install
    # If you would like to build locally, just enable this section:

    #dependencies:
    #  - name: go
    #install: |
    #  go install
